name: One-time Prospello recovery

on:
  push:
    paths:
      - .github/workflows/recover-prospello.yml

permissions:
  contents: write

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Recover and validate deployed website
        shell: bash
        run: |
          set -euo pipefail
          recovery_dir="$RUNNER_TEMP/prospello-recovery"
          mkdir -p "$recovery_dir"

          wget             --mirror             --page-requisites             --convert-links             --adjust-extension             --no-parent             --domains prospello-v2.vercel.app             --directory-prefix "$recovery_dir"             --no-host-directories             --execute robots=off             --timeout=30             --tries=2             https://prospello-v2.vercel.app/ || true

          test -f "$recovery_dir/index.html"
          test -d "$recovery_dir/static/website"

          cp -a "$recovery_dir"/. .

          mv 'static/website/css/site.css?v=20260629d.css' static/website/css/site.css
          mv 'static/website/js/site.js?v=20260629d' static/website/js/site.js

          find . -name '*.html' -print0 | xargs -0 sed -i             -e 's/site\.css%3Fv=20260629d\.css/site.css/g'             -e 's/site\.js%3Fv=20260629d/site.js/g'

          sed -i             's|fill: url(site\.css%3Fv=20260629d\.css);|fill: url(#chart-gradient);|'             static/website/css/site.css

          cat > README.md <<'EOF'
          # Prospello V2

          Recovered, deployable snapshot of the public Prospello Technologies website from the live Vercel deployment.

          ## Local preview

          ```bash
          npx serve .
          ```

          ## Deployment

          This repository is a static site and can be deployed directly to Vercel with no build command.

          ## Recovery scope

          The public HTML, stylesheets, JavaScript, images, and linked pages were recovered. Private server-side source code, environment variables, unpublished routes, and deployment history are not available from a public deployment.
          EOF

          cat > .gitignore <<'EOF'
          .DS_Store
          .vercel
          node_modules
          npm-debug.log*
          EOF

          cat > vercel.json <<'EOF'
          {
            "cleanUrls": true,
            "trailingSlash": true
          }
          EOF

          node --check static/website/js/site.js
          test "$(find . -name index.html | wc -l)" -eq 15

      - name: Commit recovered website and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/recover-prospello.yml
          rmdir .github/workflows .github 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Recover Prospello website from Vercel deployment"
          git push origin HEAD:main
